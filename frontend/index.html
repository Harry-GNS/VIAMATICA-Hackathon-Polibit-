<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimador de Copago - Healthcare AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .loading {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 12px 16px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #f44336;
            padding: 8px 16px;
            font-size: 12px;
        }

        .reset-btn:hover {
            background: #da190b;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            margin: 10px 0;
        }

        .status {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px;
        }

        .status.connected {
            color: #4caf50;
        }

        .status.error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Estimador de Copago</h1>
            <p>Descubre tu costo de atención médica</p>
        </div>

        <div id="chatContainer" class="chat-container">
            <div class="message assistant">
                <div class="message-content">
                    Hola, soy tu asistente de salud. Cuéntame tus síntomas y te ayudaré a entender tu cobertura, especialidad recomendada y costo exacto. ¿Qué síntoma tienes?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-field">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Describe tu síntoma aquí..."
                    autocomplete="off"
                >
                <button id="sendBtn" onclick="sendMessage()">Enviar</button>
                <button class="reset-btn" onclick="resetChat()">Reiniciar</button>
            </div>
        </div>

        <div class="status" id="status">Conectando...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        let isConnected = false;

        // Verificar conexión al servidor
        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    isConnected = true;
                    status.textContent = 'Conectado';
                    status.classList.add('connected');
                } else {
                    setDisconnected();
                }
            } catch (error) {
                setDisconnected();
            }
        }

        function setDisconnected() {
            isConnected = false;
            status.textContent = 'Desconectado del servidor';
            status.classList.add('error');
        }

        // Enviar mensaje
        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;
            
            if (!isConnected) {
                showError('No estás conectado al servidor. Verifica que el backend esté ejecutándose en http://localhost:5000');
                return;
            }

            // Mostrar mensaje del usuario
            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;

            // Mostrar indicador de carga
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                loadingDiv.remove();

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage(data.message, 'assistant');
                } else {
                    showError(data.message || 'Error procesando tu solicitud');
                }
            } catch (error) {
                loadingDiv.remove();
                showError('Error conectando con el servidor: ' + error.message);
                setDisconnected();
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Agregar mensaje al chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Mostrar error
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Reiniciar chat
        async function resetChat() {
            if (!isConnected) {
                showError('No estás conectado al servidor');
                return;
            }

            try {
                await fetch(`${API_URL}/api/reset`, {
                    method: 'POST'
                });
                
                chatContainer.innerHTML = '';
                addMessage('Hola, soy tu asistente de salud. Cuéntame tus síntomas y te ayudaré a entender tu cobertura, especialidad recomendada y costo exacto. ¿Qué síntoma tienes?', 'assistant');
            } catch (error) {
                showError('Error reiniciando conversación');
            }
        }

        // Event listeners
        userInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        // Verificar conexión al cargar
        window.addEventListener('load', function() {
            checkConnection();
            setInterval(checkConnection, 5000); // Verificar cada 5 segundos
        });
    </script>
</body>
</html>
